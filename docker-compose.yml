version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gestion-centrale-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: gestion_centrale
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./server/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - gestion-centrale-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gestion-centrale-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/gestion_centrale?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - gestion-centrale-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gestion-centrale-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gestion-centrale-network

volumes:
  mongodb_data:

networks:
  gestion-centrale-network:
    driver: bridge